<svg xmlns="http://www.w3.org/2000/svg" width="660" height="660" viewBox="0 0 660 660" role="img" aria-labelledby="title description">
  <title id="title">BabbelStream DMG install background</title>
  <desc id="description">A minimal Finder background with installation instructions and a drag arrow.</desc>
  <defs>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbfbfc"/>
      <stop offset="1" stop-color="#eff2f4"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#15202a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="translate(0 120)">
    <rect width="660" height="420" fill="url(#surface)"/>
    <rect x="28" y="26" width="604" height="368" rx="26" fill="#ffffff" opacity="0.82" filter="url(#soft-shadow)"/>
    <rect x="29" y="27" width="602" height="366" rx="25" fill="none" stroke="#d7dde2"/>

    <text x="330" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="25" font-weight="700" fill="#101820">Install BabbelStream</text>
    <text x="330" y="108" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#65707a">Drag the app to Applications</text>

    <g transform="translate(0 31) translate(334 286.5) scale(0.8) translate(-334 -286.5)" fill="none" stroke="#09145a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M258 262 C294 316 368 316 410 257"/>
      <path d="M382 262 L410 257 L406 286"/>
    </g>

  </g>
</svg>
